services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      NODE_ENV: production
      DATABASE_URL: postgresql://ytgrabber:ytgrabber@db:5432/ytgrabber
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      BHAGWAT_PASSWORD: ${BHAGWAT_PASSWORD}
      ASSEMBLYAI_API_KEY: ${ASSEMBLYAI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # Allow large uploads and long-running downloads
    stop_grace_period: 2m

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ytgrabber
      POSTGRES_USER: ytgrabber
      POSTGRES_PASSWORD: ytgrabber
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ytgrabber"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
