kind = "web"
  previewPath = "/"
  title = "YouTube Downloader & Bhagwat AI Video Editor"
  version = "1.0.0"
  id = "yt-downloader-artifact"

  [[services]]
  localPort = 5173
  name = "Frontend"
  paths = ["/"]

  [services.env]
  PORT = "5173"
  BASE_PATH = "/"

  [services.development]
  run = "pnpm --filter @workspace/yt-downloader run dev"

  [services.production]

  [services.production.build]
  args = ["pnpm", "--filter", "@workspace/yt-downloader", "run", "build"]

  [services.production.run]
  args = ["node", "-e", "require('http').createServer((req, res) => { const fs = require('fs'), path = require('path'); let file = path.join('/home/runner/workspace/artifacts/yt-downloader/dist/public', req.url === '/' ? 'index.html' : req.url); if (!fs.existsSync(file)) file = path.join('/home/runner/workspace/artifacts/yt-downloader/dist/public', 'index.html'); res.end(fs.readFileSync(file)); }).listen(process.env.PORT || 5173)"]
  